<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create account — Wax & Wire</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap header-row">
    <a class="brand" href="/index.html"><span class="disc"></span> Wax & Wire</a>
    <nav class="main-nav">
      <a href="/index.html">Catalog</a>
      <a href="/cart.html">Crate</a>
    </nav>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="sub">Save your details, track orders, check out faster.</p>
    <div class="form-error" id="form-error"></div>
    <form id="register-form">
      <div class="form-field">
        <label for="name">Name</label>
        <input type="text" id="name" required autocomplete="name" />
      </div>
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" />
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="submit-btn">Create account</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  document.getElementById("register-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("form-error");
    errorBox.classList.remove("show");
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "Creating account…";
    try {
      await api("/auth/register", {
        method: "POST",
        body: {
          name: document.getElementById("name").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        },
      });
      window.location.href = "/index.html";
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Create account";
    }
  });
</script>
</body>
</html>
