<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Wax & Wire</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="wrap header-row">
    <a class="brand" href="/index.html"><span class="disc"></span> Wax & Wire</a>
    <nav class="main-nav">
      <a href="/index.html">Catalog</a>
      <a href="/cart.html">Crate</a>
    </nav>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="sub">Sign in to check out and see your order history.</p>
    <div class="form-error" id="form-error"></div>
    <form id="login-form">
      <div class="form-field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button class="btn btn-primary btn-block" type="submit" id="submit-btn">Sign in</button>
    </form>
    <div class="auth-switch">New to Wax & Wire? <a href="/register.html">Create an account</a></div>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  const nextUrl = new URLSearchParams(window.location.search).get("next") || "/index.html";

  document.getElementById("login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorBox = document.getElementById("form-error");
    errorBox.classList.remove("show");
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "Signing in…";
    try {
      await api("/auth/login", {
        method: "POST",
        body: {
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value,
        },
      });
      window.location.href = nextUrl;
    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Sign in";
    }
  });
</script>
</body>
</html>
